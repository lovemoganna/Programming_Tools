<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programming Tools Hub</title>
    <!--
      GitHub Pages SPA 404 fallback — Rafael Pedicini technique.
      Stores the current path in sessionStorage and redirects to the
      root so index.html can restore it for React Router.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 1; // Number of path segments in the repo name, e.g. /Programming_Tools/ = 1
      var location = window.location;
      sessionStorage.setItem(
        'spa_redirect',
        location.pathname.slice(1).split('/').slice(segmentCount).join('/') +
          (location.search ? location.search : '') +
          (location.hash ? location.hash : '')
      );
      location.replace(
        location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          '/' +
          location.pathname.slice(1).split('/').slice(0, segmentCount).join('/')
      );
    </script>
  </head>
  <body></body>
</html>
