name: Build & Deploy to GitHub Pages

# 触发条件：push 到 main 分支时自动执行
on:
  push:
    branches:
      - main
  # 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限，用于部署到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 拉取代码 ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于 peaceiris 生成正确的 commit 信息

      # ── Step 2: 配置 Node.js 环境 ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Step 3: 安装依赖（CI 模式，严格锁版本）────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 4: 运行测试 ──────────────────────────────────────────────────
      - name: Run tests
        run: npm test -- --run
        # --run 让 vitest 以非 watch 模式执行一次后退出

      # ── Step 5: 构建生产包 ────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Step 5.5: 验证构建产物（确保 dist/index.html 包含正确的 base 路径）─
      - name: Verify build output
        run: |
          echo "=== dist/index.html head ==="
          head -5 dist/index.html
          echo "=== Checking for /Programming_Tools/ in index.html ==="
          grep -c "Programming_Tools" dist/index.html && echo "✅ base path found" || echo "❌ base path missing!"
          ls -la dist/

      # ── Step 6: 发布 dist/ 到 gh-pages 分支 ─────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
          # 禁用 Jekyll 处理，防止 _assets/ 等目录被忽略
          enable_jekyll: false
          # 每次部署强制孤立 commit，保持 gh-pages 分支干净
          force_orphan: true
