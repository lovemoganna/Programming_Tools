name: Build & Deploy to GitHub Pages

# 触发条件：push 到 main 分支时自动执行
on:
  push:
    branches:
      - main
  # 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限，用于部署到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 拉取代码 ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于 peaceiris 生成正确的 commit 信息

      # ── Step 2: 配置 Node.js 环境 ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Step 3: 安装依赖（CI 模式，严格锁版本）────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 4: 运行测试 ──────────────────────────────────────────────────
      - name: Run tests
        run: npm test -- --run
        # --run 让 vitest 以非 watch 模式执行一次后退出

      # ── Step 5: 构建生产包（注入 GitHub Pages base 路径）─────────────────
      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Programming_Tools/

      # ── Step 6: 发布 dist/ 到 gh-pages 分支 ─────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
          # 保留 CNAME 等自定义文件（如果有的话）
          keep_files: false
